  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 --ink-soft:     #1f3329;\n    --ink-faint:    #5e7368;\n    --line:         #d9ebe0;\n    --line-soft:    #e5f3eb;\n    --pink:         #2d7a4f;   /* forest green primary */\n    --pink-soft:    #d4ead9;\n    --pink-deep:    #1a5733;\n    --pink-wash:    #eef6f0;\n    --coral:        #7fb29b;\n    --sunshine:     #f8d35a;\n    --mint:         #b4dccd;\n  }\n  *{box-sizing:border-box; margin:0; padding:0}\n  html,body{\n    background:#0f1a13;\n    color:var(--ink);\n    font-family:\"DM Sans\", system-ui, sans-serif;\n    -webkit-font-smoothing:antialiased;\n    font-feature-settings:\"ss01\",\"kern\";\n  }\n  body{padding:36px 0 100px}\n\n  /* Stage frame (screen only) */\n  .stage{ max-width: 1100px; margin: 0 auto; display:flex; flex-direction:column; align-items:center; gap:48px }\n  .stage-head{ color:#fff5f8; text-align:center }\n  .stage-head h1{ font-family:\"DM Serif Display\", serif; font-size: 28px; font-weight:400; margin:0 0 4px; letter-spacing:-.01em }\n  .stage-head p{ font-family:\"DM Mono\", monospace; font-size: 10.5px; letter-spacing:.18em; opacity:.55; text-transform:uppercase }\n\n  /* PAGE = 8.5\" x 11\" at 96dpi = 816 x 1056 */\n  .page{\n    width: 816px;\n    min-height: 1056px;\n    background: var(--paper);\n    position: relative;\n    overflow: hidden;\n    box-shadow: 0 22px 50px -18px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.2);\n    color: var(--ink);\n  }\n\n  /* ─────────────────────────────────────────────────────────── */\n  /*  COVER                                                       */\n  /* ─────────────────────────────────────────────────────────── */\n  .cover{ padding: 64px 60px 64px; position:relative; overflow:hidden }\n  .cover-pink-block{\n    position:absolute; right: -80px; top: -80px;\n    width: 460px; height: 460px;\n    background: var(--pink);\n    border-radius: 50%;\n    z-index: 0;\n  }\n  .cover-coral-block{\n    position:absolute; left: -100px; bottom: 80px;\n    width: 280px; height: 280px;\n    background ock; font-family:\"DM Mono\", monospace; font-size:9.5px;\n    letter-spacing:.18em; text-transform:uppercase; margin-bottom:3px;\n  }\n\n  /* PRINT */\n  @media print {\n    @page { size: 8.5in 11in; margin: 0 }\n    html, body { background: white; padding: 0; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact }\n    .stage-head { display:none }\n    .stage{ display:block; max-width:none; gap:0 }\n    .page{\n      width: 8.5in; min-height: 11in;\n      box-shadow: none;\n      page-break-after: always;\n      break-after: page;\n      margin: 0;\n    }\n    .page:last-child{ page-break-after: auto; break-after: auto }\n  }\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n<div class=\"stage\">\n  <header class=\"stage-head\">\n    <h1>NooknKey — A Little Guide to Nashville<\u002Fh1>\n    <p>Printable guidebook · Letter portrait · Ctrl/⌘ P to save as PDF<\u002Fp>\n  <\u002Fheader>\n\n  <!-- ─── 01 COVER ─────────────────────────────────────────── -->\n  <div class=\"page cover\">\n    <div class=\"cover-pink-block\"><\u002Fdiv>\n    <div class=\"cover-coral-block\"><\u002Fdiv>\n    <div class=\"cover-dot-grid\"><\u002Fdiv>\n\n    <div class=\"cover-mark\">\n      <div class=\"logo-circle\">N<\u002Fdiv>\n      <div class=\"brand-text\">\n        <b>NooknKey<\u002Fb>\n        Nashville · Tennessee\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"cover-headline\">A&nbsp;Little<br><em>Guide<\u002Fem><br>to&nbsp;Nashville<\u002Fh1>\n    <p class=\"cover-sub\">Everything you need for a happy stay — &amp; a handful of our favourite places, with prices, so you can plan well &amp; eat better.<\u002Fp>\n\n    <div class=\"cover-meta\">\n      <div class=\"col\">\n        <div class=\"lbl\">Volume One<\u002Fdiv>\n        <div class=\"val mono\">2026 Edition<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"text-align:center\">\n        <div class=\"lbl\">Property<\u002Fdiv>\n        <div class=\"val\">4810 Michigan Ave<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"text-align:right\">\n        <div class=\"lbl\">For our<\u002Fdiv>\n        <div class=\"val\">Lovely Guests<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 02 TABLE OF CONTENTS ─────────────────────────────── -->\n  <div class=\"page toc\">\n    <div class=\"toc-eye\">A Table of Contents<\u002Fdiv>\n    <h1 class=\"toc-title\">What's <em>inside<\u002Fem>.<\u002Fh1>\n    <p class=\"toc-sub\">Five short chapters — the house, the add-ons, the food, the wandering, &amp; a little something for your next stay.<\u002Fp>\n\n    <div class=\"toc-entries\">\n      <div class=\"toc-row\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ttl\">Welcome Home<\u002Fdiv>\n          <div class=\"desc\">Door code · Wi-Fi · thermostat · trash · check-out · everything you need to settle in.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pgn\">Page <b>03<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-row\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ttl\">Experience &amp; Add-Ons<\u002Fdiv>\n          <div class=\"desc\">Early check-in · stocking · decor · transfers · celebrations · &amp; the full concierge.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pgn\">Page <b>07<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-row\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ttl\">Where to Eat<\u002Fdiv>\n          <div class=\"desc\">Brunch · lunch · dinner by cuisine · dessert · cocktails — with prices &amp; vibes.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pgn\">Page <b>10<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-row\">\n        <div class=\"num\">04<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ttl\">Where to Wander<\u002Fdiv>\n          <div class=\"desc\">Pedal pubs · honky-tonks · museums · pilates · rooftops · shopping · sports.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pgn\">Page <b>14<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-row\">\n        <div class=\"num\">05<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ttl\">Come Back Soon<\u002Fdiv>\n          <div class=\"desc\">Your VIP returning-guest code — five percent off when you book direct, every time.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pgn\">Page <b>18<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"toc-foot\">\n      <span>NooknKey · 4810 Michigan Ave · Nashville TN<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 03 SECTION I DIVIDER ─────────────────────────────── -->\n  <div class=\"page divider-page\">\n    <div class=\"band\">\n      <div class=\"top\">\n        <span class=\"part\">Chapter One · Welcome Home<\u002Fspan>\n        <span class=\"part\">— 01 / 05 —<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"roman\">— I —<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"below\">\n      <h2>Welcome <em>home<\u002Fem>.<\u002Fh2>\n      <p class=\"blurb\">A pretty old Victorian on Michigan Avenue — restored with care &amp; ready for you. Everything in this chapter is the practical stuff: <b>the door, the Wi-Fi, the thermostat, the bins<\u002Fb> — &amp; the small rules that keep it in one piece.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"inside\">\n      <div class=\"inside-label\">In this chapter<\u002Fdiv>\n      <ul>\n        <li>The smart-lock &amp; door code<\u002Fli>\n        <li>Directions &amp; parking<\u002Fli>\n        <li>Wi-Fi &amp; television<\u002Fli>\n        <li>The thermostat<\u002Fli>\n        <li>The kitchen &amp; workspace<\u002Fli>\n        <li>Trash &amp; tidying<\u002Fli>\n        <li>House rules<\u002Fli>\n        <li>Check-out<\u002Fli>\n        <li>If you need us<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 04 HOUSE MANUAL PAGE 1 ───────────────────────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Welcome Home<\u002Fspan>\n      <span class=\"right\">Chapter I · 01 of 04<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">The house, <em>the hosts<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">Address book, contact details, &amp; how to open the front door without calling us at midnight.<\u002Fp>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div class=\"label\">Address<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p style=\"font-family:'DM Serif Display',serif; font-size:22px; color:var(--ink); line-height:1.1; letter-spacing:-.005em\">4810 Michigan Avenue<\u002Fp>\n        <p>Nashville, Tennessee 37209 · West Nashville · about 8 minutes by car to Broadway.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div class=\"label\">Your Hosts<\u002Fdiv>\n        <div class=\"sub\">Reach out anytime — Airbnb chat is fastest.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <div class=\"contact-grid\">\n          <div class=\"contact-card\">\n            <div class=\"name\">Giorgio Estephan<\u002Fdiv>\n            <div class=\"role\">Host · Primary<\u002Fdiv>\n            <div class=\"num\">+1 (780) 499 · 9349<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"contact-card\">\n            <div class=\"name\">Danny Estephan<\u002Fdiv>\n            <div class=\"role\">Host<\u002Fdiv>\n            <div class=\"num\">+1 (780) 718 · 6468<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin-top:8px\"><strong>Email<\u002Fstrong> · restorerenaissance @ gmail · com<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div class=\"label\">The Smart-Lock<\u002Fdiv>\n        <div class=\"sub\">A Yale keypad on the front door.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p><strong>To unlock<\u002Fstrong><\u002Fp>\n        <ol>\n          <li>Press the Yale button to wake the screen.<\u002Fli>\n          <li>Type your code: <span class=\"keycode\"><span class=\"lbl\" style=\"font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.26em; color:var(--pink-deep); text-transform:uppercase; margin-right:4px\">Your special booking code<\u002Fspan><span class=\"v\">XXXX<\u002Fspan><\u002Fspan><\u002Fli>\n          <li>Press the check-mark to confirm ✓<\u002Fli>\n        <\u002Fol>\n        <p style=\"margin-top:8px\"><strong>When leaving<\u002Fstrong> · pull the door toward you, press the Yale button to lock. Please lock <em>both<\u002Fem> the front Yale &amp; the back door at check-out.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">04<\u002Fdiv>\n        <div class=\"label\">Directions &amp; Parking<\u002Fdiv>\n        <div class=\"sub\">From the airport · ~15 minutes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>Type <strong>4810 Michigan Ave<\u002Fstrong> into Google Maps for the simplest route, or follow:<\u002Fp>\n        <p style=\"font-family:'DM Mono',monospace; font-size:11.5px; line-height:1.6; background:var(--paper-soft); padding:10px 14px; border-radius:3px;\">I-40 / I-65 N · 0.3 mi → continue on I-40 / I-65 N → Exit 205 (Delaware Ave) from I-40 W · 3.9 mi → 46th Ave N → Michigan Ave.<\u002Fp>\n        <div class=\"callout\">\n          <b>A small note on parking<\u002Fb>\n          <strong>Please do not park on the grass.<\u002Fstrong> Free street parking is plentiful out front, &amp; there's private parking behind the property with a gate that opens into the back of the house.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">03<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 05 HOUSE MANUAL PAGE 2 ───────────────────────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Welcome Home<\u002Fspan>\n      <span class=\"right\">Chapter I · 02 of 04<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">The Wi-Fi, <em>the warmth<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">Internet, thermostat, telly, kitchen — the small daily things that make a stay a stay.<\u002Fp>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">05<\u002Fdiv>\n        <div class=\"label\">Wi-Fi<\u002Fdiv>\n        <div class=\"sub\">Strong throughout. No ethernet.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <div class=\"wifi-box\">\n          <span class=\"lbl\">Network<\u002Fspan>\n          <span class=\"val\">TMobile-44C8<\u002Fspan>\n          <span class=\"lbl\">Password<\u002Fspan>\n          <span class=\"val\">68db4vsf523<\u002Fspan>\n        <\u002Fdiv>\n        <p><em>Note · there is currently no ethernet connector in the house. The Wi-Fi reaches every room.<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">06<\u002Fdiv>\n        <div class=\"label\">Thermostat<\u002Fdiv>\n        <div class=\"sub\">Smart panel · upstairs has a remote.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>Two columns on the left of the panel: <strong>upper<\u002Fstrong> controls the fan, <strong>lower<\u002Fstrong> controls the full system. After any change, press <strong>DONE<\u002Fstrong> to confirm &amp; activate.<\u002Fp>\n        <p>Upstairs, look for the small remote that controls the wall-mounted unit.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">07<\u002Fdiv>\n        <div class=\"label\">Television<\u002Fdiv>\n        <div class=\"sub\">Streaming only.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>The 70-inch is streaming-only — there is no cable. Use the remote to power on &amp; navigate to <strong>Netflix · Prime · Hulu<\u002Fstrong> &amp; the like. Sign in with your own accounts &amp; <strong>sign out before check-out<\u002Fstrong>, please.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">08<\u002Fdiv>\n        <div class=\"label\">Kitchen<\u002Fdiv>\n        <div class=\"sub\">Fully stocked · modern + considered.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>Sink, stove, microwave, fridge, dishwasher. Cutlery, knives, plates, glassware, mixing bowls, strainer, blender &amp; a <strong>Keurig coffee maker<\u002Fstrong>. We provide a sponge, dish soap, laundry pods, towels &amp; paper towel.<\u002Fp>\n        <div class=\"callout\">\n          <b>One small request<\u002Fb>\n          <strong>Please use a cutting board<\u002Fstrong> — don't cut directly on the countertops. No excessive amounts of amenities are stocked; if you run out, you're welcome to top up during your stay.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">09<\u002Fdiv>\n        <div class=\"label\">Workspace<\u002Fdiv>\n        <div class=\"sub\">A desk by the window.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>A dedicated work area with a desk lamp &amp; natural light — for the guest who is here to work as much as to wander.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">04<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 06 HOUSE MANUAL PAGE 3 ───────────────────────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Welcome Home<\u002Fspan>\n      <span class=\"right\">Chapter I · 03 of 04<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">The rules, <em>the ritual<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">A short list of the few small rules that keep this old house in one piece, &amp; how to close it up sweetly when you go.<\u002Fp>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">10<\u002Fdiv>\n        <div class=\"label\">Trash &amp; Tidying<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p><strong>Day-to-day<\u002Fstrong> · the trash bin lives under the kitchen sink.<\u002Fp>\n        <p><strong>Permanent removal<\u002Fstrong> · the large green bins are at the back of the property — empty the kitchen bag there before check-out.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">11<\u002Fdiv>\n        <div class=\"label\">House Rules<\u002Fdiv>\n        <div class=\"sub\">A small list, a big love.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <ul>\n          <li><strong>Check-out<\u002Fstrong> at 10 AM · <strong>check-in<\u002Fstrong> from 4 PM.<\u002Fli>\n          <li><strong>No<\u002Fstrong> smoking, vaping, parties, or loud events — the deposit is forfeited if these are broken.<\u002Fli>\n          <li>The fireplaces are <strong>deactivated<\u002Fstrong> to preserve the integrity of the original structure.<\u002Fli>\n          <li>Please do not allow strangers into the home · secure your belongings · we are not responsible for lost or damaged items, nor injuries on the property.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">12<\u002Fdiv>\n        <div class=\"label\">Check-Out<\u002Fdiv>\n        <div class=\"sub\">10 AM, sharp-ish.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>If you'd like an early check-in or late check-out, do ask — the best time is <em>before<\u002Fem> your trip begins or ends, never the day-of. Depending on the booking calendar we may or may not be able to swing it.<\u002Fp>\n        <p><strong>Before you leave<\u002Fstrong> · tidy up · take the trash out back · lock both doors. <strong>You do not need to strip the bed.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manual\">\n      <div class=\"lhs\">\n        <div class=\"num\">13<\u002Fdiv>\n        <div class=\"label\">If You Need Us<\u002Fdiv>\n        <div class=\"sub\">We're a message away.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rhs\">\n        <p>Have a wonderful stay. If anything goes sideways — or even if you just have a question — please reach out. The Airbnb app is fastest, but our numbers &amp; email are below.<\u002Fp>\n        <div class=\"contact-grid\">\n          <div class=\"contact-card\">\n            <div class=\"name\">Giorgio<\u002Fdiv>\n            <div class=\"role\">Primary Contact<\u002Fdiv>\n            <div class=\"num\">+1 (780) 499 · 9349<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"contact-card\">\n            <div class=\"name\">Danny<\u002Fdiv>\n            <div class=\"role\">Host<\u002Fdiv>\n            <div class=\"num\">+1 (780) 718 · 6468<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">05<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u <\u002Fspan><span class=\"cg-per\">/ day<\u002Fspan><span class=\"cg-or\">or $750 / weekend<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"cg-blurb\">Hand the whole trip to us. We plan the days, book the tables, line up the cars, stock the house &amp; stay on-call from arrival to checkout — so your only job is to show up &amp; enjoy it.<\u002Fp>\n      <div class=\"cg-grid\">\n        <div class=\"cg-item\"><b>Reservations<\u002Fb>Dinners, shows, tastings &amp; tours — booked &amp; confirmed for you.<\u002Fdiv>\n        <div class=\"cg-item\"><b>Daily Planning<\u002Fb>A built-out itinerary, adjusted on the fly as the weekend unfolds.<\u002Fdiv>\n        <div class=\"cg-item\"><b>Transport<\u002Fb>Airport runs, party buses &amp; rides between stops, all coordinated.<\u002Fdiv>\n        <div class=\"cg-item\"><b>Pre-Stocking<\u002Fb>Groceries, the bar cart &amp; breakfast handled before you land.<\u002Fdiv>\n        <div class=\"cg-item\"><b>On-Call Host<\u002Fb>A dedicated line from early morning to late night, every day.<\u002Fdiv>\n        <div class=\"cg-item\"><b>The Extras<\u002Fb>Decor, cakes, surprises &amp; anything else you can dream up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">08<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"page divider-page\">\n    <div class=\"band\">\n      <div class=\"top\">\n        <span class=\"part\">Chapter Three · Where to Eat<\u002Fspan>\n        <span class=\"part\">— 03 / 05 —<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"roman\">— III —<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"below\">\n      <h2>Where to <em>eat<\u002Fem>.<\u002Fh2>\n      <p class=\"blurb\">Nashville eats well. Here are the places we would walk to, drive across town for, &amp; quietly press into the hands of anyone who asks. Brunch, lunch, dinner by cuisine, dessert &amp; a cocktail — <b>with prices &amp; vibes<\u002Fb> so you can plan with confidence.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"inside\">\n      <div class=\"inside-label\">In this chapter<\u002Fdiv>\n      <ul>\n        <li>Brunch &amp; coffee<\u002Fli>\n        <li>Lunch &amp; hot chicken<\u002Fli>\n        <li>American dinner<\u002Fli>\n        <li>Italian dinner<\u002Fli>\n        <li>French · Spanish · Lebanese<\u002Fli>\n        <li>Sushi · Asian · Thai<\u002Fli>\n        <li>Seafood<\u002Fli>\n        <li>Gluten-free &amp; vegan<\u002Fli>\n        <li>Dessert &amp; cocktails<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 08 EAT PAGE 1 — Brunch & Lunch ───────────────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Eat<\u002Fspan>\n      <span class=\"right\">Chapter III · 01 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Brunch, lunch <em>&amp; mornings<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">Coffee, biscuits, the kind of bagel worth driving for, &amp; the hot chicken Nashville built its reputation on.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">i.<\u002Fspan>\n      <span class=\"cat-title\">For Brunch<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">07 spots<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"listings-grid\">\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Frothy Monkey<\u002Fspan><span class=\"price\">$$ · $12–22<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Beloved local coffee house &amp; brunch institution — multiple Nashville locations, easy any morning.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">Multiple Locations<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Buttermilk Ranch<\u002Fspan><span class=\"price\">$$ · $14–24<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">The 12 South darling. Biscuits, hash, the works — <em>no reservations<\u002Fem>, show up early or expect a wait.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip hot\">No Reservations<\u002Fspan><span class=\"chip outline\">12 South<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Benji's Bagels<\u002Fspan><span class=\"price\">$ · $8–14<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Sweet &amp; savoury bagels of the proper kind — schmears, sandwiches, &amp; a Nashville-Brooklyn energy.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">Counter Service<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">5 Daughters Bakery<\u002Fspan><span class=\"price\">$ · $6–12<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">100-layer breakfast donuts — a true Nashville institution worth the line. Locations in 12 South &amp; the Gulch.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip hot\">Nashville Icon<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Suzy Wong's Drag-n-Brunch<\u002Fspan><span class=\"price\">$$$ · $45+<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Drag brunch in Midtown — full show with bottomless mimosa &amp; food packages. Book ahead for weekends.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><span class=\"chip outline\">Midtown<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Biscuit Love<\u002Fspan><span class=\"price\">$$ · $14–22<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Locally-sourced Southern breakfast in the Gulch. The \"bonuts\" — fried biscuit donuts — are non-negotiable.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Milk &amp; Honey<\u002Fspan><span class=\"price\">$$ · $10–20<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Trendy, cozy coffee with house-made gelati &amp; baked goods. In the Gulch — good for a slow morning.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">The Hampton Social<\u002Fspan><span class=\"price\">$$$ · $20–40<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Breezy nautical room serving seafood, beach-themed cocktails &amp; a long brunch menu. Instagrammable.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">ii.<\u002Fspan>\n      <span class=\"cat-title\">For Lunch<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 spots<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"listings-grid\">\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Hattie B's<\u002Fspan><span class=\"price\">$ · $12–18<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">The Nashville hot chicken everyone tells you about, &amp; rightly so. Order one level milder than your ego suggests.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip hot\">Hot Chicken<\u002Fspan><span class=\"chip outline\">Multiple Locations<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">51st Deli<\u002Fspan><span class=\"price\">$ · $10–16<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">A proper deli within easy walking distance of the house — sandwiches, soups &amp; everyday lunches.<\u002Fdiv>\n        <div class=\"meta\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Dog Daddy<\u002Fspan><span class=\"price\">$ · $8–15<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Designer hot dogs that take themselves just seriously enough. Tots, slaws &amp; a long sauce list.<\u002Fdiv>\n        <div class=\"meta\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"listing\">\n        <div class=\"top\"><span class=\"name\">Red Headed Stranger<\u002Fspan><span class=\"price\">$ · $10–18<\u002Fspan><\u002Fdiv>\n        <div class=\"desc\">Gourmet tacos with a true sense of place. Casual counter, big flavours, named after the Willie Nelson album.<\u002Fdiv>\n        <div class=\"meta\"><span class=\"chip outline\">East Nashville<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">10<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 09 EAT PAGE 2 — Dinner ───────────────────────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Eat<\u002Fspan>\n      <span class=\"right\">Chapter III · 02 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Dinner, <em>by cuisine<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">A small atlas of the city's best tables — American, Italian, French, Spanish, Lebanese, Asian, seafood. Reservations recommended for most.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">iii.<\u002Fspan>\n      <span class=\"cat-title\">American<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">06 tables<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Answer<\u002Fspan><span class=\"price\">$$$ · $35–60<\u002Fspan><\u002Fdiv><div class=\"desc\">Polished new-American in Sylvan Park — also wonderful for a serious cocktail at the bar.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Sylvan Park<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">5th &amp; Taylor<\u002Fspan><span class=\"price\">$$$ · $30–55<\u002Fspan><\u002Fdiv><div class=\"desc\">Industrial-chic supper-club in Germantown · Southern comfort with a chef's-table polish.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Germantown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Rolf &amp; Daughters<\u002Fspan><span class=\"price\">$$$ · $30–55<\u002Fspan><\u002Fdiv><div class=\"desc\">Hand-rolled pastas in a Germantown brick room — perpetually on every \"best of Nashville\" list.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Reservations<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Husk<\u002Fspan><span class=\"price\">$$$$ · $40–80<\u002Fspan><\u002Fdiv><div class=\"desc\">Sean Brock's Southern flagship — hyper-local, ingredient-led, &amp; the most \"Nashville\" of fine-dining rooms.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Reservations<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Butchertown Hall<\u002Fspan><span class=\"price\">$$ · $20–40<\u002Fspan><\u002Fdiv><div class=\"desc\">German-Texan smokehouse · big proteins, big beer, big room. Casual &amp; lively.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Germantown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">M.L. Rose<\u002Fspan><span class=\"price\">$$ · $14–24<\u002Fspan><\u002Fdiv><div class=\"desc\">Neighbourhood craft burger &amp; beer. Easy, late, walkable from most of the west side.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">iv.<\u002Fspan>\n      <span class=\"cat-title\">Italian<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">07 tables<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Luogo<\u002Fspan><span class=\"price\">$$$ · $25–45<\u002Fspan><\u002Fdiv><div class=\"desc\">Wood-fired Roman pizza &amp; pasta in a low-lit, perpetually-booked room.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Pelato<\u002Fspan><span class=\"price\">$$$ · $26–48<\u002Fspan><\u002Fdiv><div class=\"desc\">Modern Italian with a wood oven &amp; a serious wine list. East Nashville's reliable special night.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Moto<\u002Fspan><span class=\"price\">$$ · $20–38<\u002Fspan><\u002Fdiv><div class=\"desc\">Casual Italian in the Gulch · pasta, prosecco &amp; the kind of room that swallows you for three hours.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">City House<\u002Fspan><span class=\"price\">$$$ · $24–44<\u002Fspan><\u002Fdiv><div class=\"desc\">A Germantown classic — Italian-inflected Southern · the bell-pepper-and-fennel pizza is legendary.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Amerigo<\u002Fspan><span class=\"price\">$$$ · $22–40<\u002Fspan><\u002Fdiv><div class=\"desc\">The Italian everyone's parents recommend — generous portions, classic dishes, easy night out.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Pennepazze<\u002Fspan><span class=\"price\">$$ · $18–32<\u002Fspan><\u002Fdiv><div class=\"desc\">Pasta-bar simplicity · the kind of plate-of-noodles you crave on a rainy night.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Folk<\u002Fspan><span class=\"price\">$$$ · $24–44<\u002Fspan><\u002Fdiv><div class=\"desc\">East Nashville · Italian, wood-fired, &amp; one of the city's loveliest dining rooms.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">v.<\u002Fspan>\n      <span class=\"cat-title\">French · Spanish · Lebanese · Asian · Seafood<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Margot Café &amp; Bar<\u002Fspan><span class=\"price\">$$$ · $28–50<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>French · Italian.<\u002Fem> Margot Café is the East-Nash matriarch — bistro classics, weekly menu, warm room.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Iberian Pig<\u002Fspan><span class=\"price\">$$$ · $22–42<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Spanish.<\u002Fem> Tapas &amp; jamón in a downtown room with a long bar — order the lamb meatballs.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Lola<\u002Fspan><span class=\"price\">$$$ · $22–40<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Spanish.<\u002Fem> Tapas, sangria, &amp; a quiet, candle-lit room that does date nights well.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Barcelona Wine Bar<\u002Fspan><span class=\"price\">$$$ · $20–38<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Spanish.<\u002Fem> Tapas + Iberian wines. Reliable for groups.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Epice<\u002Fspan><span class=\"price\">$$ · $18–32<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Lebanese.<\u002Fem> Soulful, generous, family-run · the mezze are worth driving for.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Noko<\u002Fspan><span class=\"price\">$$$ · $26–48<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Pan-Asian.<\u002Fem> Wood-grilled small plates &amp; cocktails in a candle-lit East-Nash room.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Oku<\u002Fspan><span class=\"price\">$$$$ · $40–80<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Sushi.<\u002Fem> Chef's-counter omakase &amp; pristine fish — the city's best sushi night.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Reservations<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Virago<\u002Fspan><span class=\"price\">$$$ · $24–46<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Sushi · Asian.<\u002Fem> A Gulch staple — buzzy, theatrical, &amp; reliable.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Henrietta Red<\u002Fspan><span class=\"price\">$$$ · $26–50<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Seafood.<\u002Fem> Raw bar + a wood-fired room in Germantown. Excellent oysters.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Optimist<\u002Fspan><span class=\"price\">$$$ · $26–50<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Seafood.<\u002Fem> Polished, lively · grilled whole-fish &amp; a great wine list.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Germantown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Marsh House<\u002Fspan><span class=\"price\">$$$ · $28–54<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Seafood.<\u002Fem> Inside the Thompson hotel · Gulf coastal cooking with a Nashville twist.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Urban Grub<\u002Fspan><span class=\"price\">$$$ · $24–44<\u002Fspan><\u002Fdiv><div class=\"desc\"><em>Seafood · Smokehouse.<\u002Fem> 12 South · in-house fish &amp; meat program · big plates.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">12 South<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">11<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 10 EAT PAGE 3 — GF/V, Dessert, Cocktails ─────────── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Eat<\u002Fspan>\n      <span class=\"right\">Chapter III · 03 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Plant-led, <em>sweet, &amp; sipping<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">For the gluten-free guest, the dessert detour, &amp; the proper night-cap. All within a short drive of the house.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">vi.<\u002Fspan>\n      <span class=\"cat-title\">Gluten-Free &amp; Vegan<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">09 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Sunflower Café<\u002Fspan><span class=\"price\">$$ · $12–22<\u002Fspan><\u002Fdiv><div class=\"desc\">Plant-based comfort food, all vegan — bowls, brunch, &amp; the best vegan reuben in town.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Vegan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Sunflower Bakehouse<\u002Fspan><span class=\"price\">$ · $6–14<\u002Fspan><\u002Fdiv><div class=\"desc\">Sister bakehouse · vegan pastries, cinnamon rolls &amp; coffee. Good gift to bring home.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Vegan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Graze<\u002Fspan><span class=\"price\">$$ · $12–22<\u002Fspan><\u002Fdiv><div class=\"desc\">East-Nash · plant-forward bowls &amp; comfort plates with vegan + GF clearly marked.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">AVO<\u002Fspan><span class=\"price\">$$$ · $18–34<\u002Fspan><\u002Fdiv><div class=\"desc\">Raw-vegan in the Nations · light, beautiful, &amp; serious about ingredients.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Vegan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Southern V<\u002Fspan><span class=\"price\">$ · $10–16<\u002Fspan><\u002Fdiv><div class=\"desc\">Vegan Southern comfort · \"chicken\" sandwiches, mac, greens &amp; pies. Worth the trip to North Nash.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Vegan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The BE-Hive Deli<\u002Fspan><span class=\"price\">$ · $10–16<\u002Fspan><\u002Fdiv><div class=\"desc\">East-Nash · vegan deli + market. Big \"tuna\" salad sandwiches &amp; pantry staples.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Vegan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Two Hands<\u002Fspan><span class=\"price\">$$ · $12–22<\u002Fspan><\u002Fdiv><div class=\"desc\">Australian-style café · long menu of GF + vegan options, big coffee, big bowls.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Mangia<\u002Fspan><span class=\"price\">$$$ · $24–42<\u002Fspan><\u002Fdiv><div class=\"desc\">Italian with a robust GF pasta selection · clearly marked menu, lovely room.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Amerigo<\u002Fspan><span class=\"price\">$$$ · $22–40<\u002Fspan><\u002Fdiv><div class=\"desc\">Italian — also listed above · full GF menu available.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">vii.<\u002Fspan>\n      <span class=\"cat-title\">Dessert<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Jeni's Splendid Ice Cream<\u002Fspan><span class=\"price\">$ · $6–10<\u002Fspan><\u002Fdiv><div class=\"desc\">The Ohio-born ice-cream chain Nashville claims as its own. Salty caramel, brambleberry crisp, honey-vanilla.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Legendairy Milkshake Bar<\u002Fspan><span class=\"price\">$ · $10–16<\u002Fspan><\u002Fdiv><div class=\"desc\">Decadent topped milkshakes — over the top, gloriously so. Order to share.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Lockeland Table<\u002Fspan><span class=\"price\">$$$ · $24–44<\u002Fspan><\u002Fdiv><div class=\"desc\">Not just dessert — a proper East-Nash neighbourhood Italian, with one of the best community-spirited rooms in town.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">5 Daughters Bakery<\u002Fspan><span class=\"price\">$ · $6–12<\u002Fspan><\u002Fdiv><div class=\"desc\">The 100-layer donuts again — they hold up at any hour of the day.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Icon<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">viii.<\u002Fspan>\n      <span class=\"cat-title\">For a Cocktail<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Bastion<\u002Fspan><span class=\"price\">$$$ · $14–18 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">Cocktail bar + a tiny chef's-counter dining room hidden behind a Wedgewood-Houston warehouse door.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Hidden<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Urban Cowboy Public House<\u002Fspan><span class=\"price\">$$ · $12–16 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">West-side bungalow bar attached to the boutique hotel — warm, low-lit, with a great patio.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Otto's<\u002Fspan><span class=\"price\">$$ · $12–16 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">Neighbourhood &amp; easy, with a serious cocktail list &amp; good small plates.<\u002Fdiv><div class=\"meta\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Attaboy<\u002Fspan><span class=\"price\">$$$ · $15–18 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">No menu, no cocktail list — tell the bartender what you like, get something perfect. Reservations help.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">No Menu<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">12<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 11 SECTION III DIVIDER ───────────────────────────── -->\n  <div class=\"page divider-page\">\n    <div class=\"band\">\n      <div class=\"top\">\n        <span class=\"part\">Chapter Four · Where to Wander<\u002Fspan>\n        <span class=\"part\">— 04 / 05 —<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"roman\">— IV —<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"below\">\n      <h2>Where to <em>wander<\u002Fem>.<\u002Fh2>\n      <p class=\"blurb\">From the <b>Parthenon<\u002Fb> to the <b>honky-tonks<\u002Fb> of Broadway · pedal-pubs &amp; pilates · the Bluebird, the Ryman, distillery tours, &amp; the rooftops above it all. <b>Prices, vibes, &amp; how to book<\u002Fb> — so you can plan a real Nashville day.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"inside\">\n      <div class=\"inside-label\">In this chapter<\u002Fdiv>\n      <ul>\n        <li>Pedal pubs &amp; party transport<\u002Fli>\n        <li>Honky-tonks &amp; Broadway<\u002Fli>\n        <li>Live music venues<\u002Fli>\n        <li>Museums &amp; landmarks<\u002Fli>\n        <li>Distillery &amp; brewery tours<\u002Fli>\n        <li>Parks &amp; outdoors<\u002Fli>\n        <li>Group workout classes<\u002Fli>\n        <li>Rooftop bars<\u002Fli>\n        <li>Shopping districts<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 12 WANDER PAGE 1 — Pedal pubs, Honky-tonks, Venues ─ -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Wander<\u002Fspan>\n      <span class=\"right\">Chapter IV · 01 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Broadway, <em>boots &amp; bands<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">Pedal pubs for the bachelorette crew, honky-tonks on Lower Broad, &amp; the live-music venues locals love.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">i.<\u002Fspan>\n      <span class=\"cat-title\">Pedal Pubs &amp; Party Transport<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 ways<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Nashville Pedal Tavern<\u002Fspan><span class=\"price\">~$45/pp<\u002Fspan><\u002Fdiv><div class=\"desc\">The OG 15-person pedal pub crawling Broadway, Midtown &amp; the Gulch. ~2-hour tours, BYOB on most routes.<\u002Fdiv><div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><span class=\"chip outline\">Book Ahead<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Sprocket Rocket<\u002Fspan><span class=\"price\">~$40/pp<\u002Fspan><\u002Fdiv><div class=\"desc\">Open-air pedal-cart parties &amp; group rides, broadway-to-Midtown circuits, music + BYOB.<\u002Fdiv><div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Joyride Nashville<\u002Fspan><span class=\"price\">~$15/pp/30min<\u002Fspan><\u002Fdiv><div class=\"desc\">Free street-hailable golf-carts; you pay (or tip) at the end of the ride. Easy hops between bars.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">App / Hail<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Pink Pedaler Nashville<\u002Fspan><span class=\"price\">~$50–90/pp<\u002Fspan><\u002Fdiv><div class=\"desc\">Private party buses with poles, neon, &amp; a sound system. Great for groups of 10+ doing a bachelorette weekend.<\u002Fdiv><div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><span class=\"chip outline\">Private<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">ii.<\u002Fspan>\n      <span class=\"cat-title\">Honky-Tonks · Lower Broadway<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">06 stops<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Tootsie's Orchid Lounge<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">The pink one. Three floors of live country music, no cover, drinks on the house list. Wear boots.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">No Cover<\u002Fspan><span class=\"chip hot\">Icon<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Casa Rosa<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">Miranda Lambert's pink-walled Mexican-Tex joint with rooftop &amp; live music. Margs are obligatory.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Rooftop<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Whiskey Row<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">Dierks Bentley's. Multi-floor stage, sport-bar vibe, dancing.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Live Music<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Rippy's Smokin' Bar &amp; Grill<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">BBQ + live music on Broadway · the smell hits before you cross the threshold.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Live Music<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Stage on Broadway<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">No-frills classic honky-tonk · two stages, line-dancing, &amp; the strongest country crowd of the strip.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Dancing<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Robert's Western World<\u002Fspan><span class=\"price\">Free entry<\u002Fspan><\u002Fdiv><div class=\"desc\">The locals' favourite of the strip — old-school country, fried bologna sandwiches, &amp; a hat shop in the back.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Locals' Pick<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">iii.<\u002Fspan>\n      <span class=\"cat-title\">Live Music Venues<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">05 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Ryman Auditorium<\u002Fspan><span class=\"price\">Tickets $40–200<br>Tours from $32<\u002Fspan><\u002Fdiv><div class=\"desc\">\"The Mother Church of Country Music.\" Catch a show if the night's right — or take the self-guided tour by day.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Bucket List<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Grand Ole Opry<\u002Fspan><span class=\"price\">Tickets $50–120<br>Tours from $35<\u002Fspan><\u002Fdiv><div class=\"desc\">The Opry House is the city's pilgrimage stop · backstage tours, &amp; the famous Saturday-night radio show.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Bucket List<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Bluebird Café<\u002Fspan><span class=\"price\">$20–40 + min.<\u002Fspan><\u002Fdiv><div class=\"desc\">The tiny songwriter's room in Green Hills — songs-in-the-round, two seatings nightly, lottery tickets recommended.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Reservations<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Exit/In<\u002Fspan><span class=\"price\">Tickets $20–60<\u002Fspan><\u002Fdiv><div class=\"desc\">Midtown rock club with five decades of legend — small room, big sound, always interesting.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Midtown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">3rd &amp; Lindsley<\u002Fspan><span class=\"price\">Tickets $20–60<\u002Fspan><\u002Fdiv><div class=\"desc\">Listening-room with a full menu &amp; sit-down service — songwriter rounds, blues nights, easy evenings.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Sit-Down<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">14<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 13 WANDER PAGE 2 — Museums, Distilleries, Parks ─── -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Wander<\u002Fspan>\n      <span class=\"right\">Chapter IV · 02 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Museums, <em>distilleries &amp; daylight<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">For the slower morning, the rainy afternoon, or the day-trip that still ends with a great dinner.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">iv.<\u002Fspan>\n      <span class=\"cat-title\">Museums &amp; Landmarks<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">07 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">The Parthenon<\u002Fspan><span class=\"price\">$10 / Free park<\u002Fspan><\u002Fdiv><div class=\"desc\">A full-scale replica of the Athenian Parthenon in Centennial Park — art museum inside, ancient-Greek selfies outside.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Centennial Park<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Country Music Hall of Fame<\u002Fspan><span class=\"price\">$29.95<\u002Fspan><\u002Fdiv><div class=\"desc\">The genre's main museum — costumes, instruments, &amp; the studio that recorded Elvis. Plan ~2 hours.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Downtown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Johnny Cash Museum<\u002Fspan><span class=\"price\">$25.95<\u002Fspan><\u002Fdiv><div class=\"desc\">Small but properly curated tribute — letters, set lists, the man in black's whole arc. Combo tickets with Patsy Cline next door.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Downtown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">National Museum of African American Music<\u002Fspan><span class=\"price\">$25<\u002Fspan><\u002Fdiv><div class=\"desc\">NMAAM · the only museum in the US dedicated to the African American influence on American music. Necessary.<\u002Fdiv><div class=\"meta\"><span class=\"chip hot\">Newer<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Frist Art Museum<\u002Fspan><span class=\"price\">$15 / Free Thurs night<\u002Fspan><\u002Fdiv><div class=\"desc\">The old Art-Deco post office, now a rotating fine-art museum. Free Thursday evenings &amp; under-18s always free.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Downtown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Andrew Jackson's Hermitage<\u002Fspan><span class=\"price\">$26.50<\u002Fspan><\u002Fdiv><div class=\"desc\">The 7th president's plantation home — 1,100 acres, historic buildings, &amp; an unflinching look at slavery's role.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">20 min east<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Belle Meade Historic Site<\u002Fspan><span class=\"price\">$29<\u002Fspan><\u002Fdiv><div class=\"desc\">A Greek-Revival mansion + working winery · combination history tours &amp; wine tastings.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Wine<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">v.<\u002Fspan>\n      <span class=\"cat-title\">Distilleries &amp; Breweries<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">05 stops<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Nelson's Green Brier Distillery<\u002Fspan><span class=\"price\">Tours from $20<\u002Fspan><\u002Fdiv><div class=\"desc\">Family-revived Tennessee whiskey distillery in Marathon Village · tours, tastings &amp; bottle shop.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Marathon Village<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Corsair Distillery<\u002Fspan><span class=\"price\">Tours from $18<\u002Fspan><\u002Fdiv><div class=\"desc\">Craft small-batch · gin, absinthe, smoked whiskey · a more experimental palate.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Marathon Village<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Tennessee Brew Works<\u002Fspan><span class=\"price\">Tours ~$15<\u002Fspan><\u002Fdiv><div class=\"desc\">Brewery + restaurant in a converted SoBro warehouse — tour, taste, stay for dinner.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">SoBro<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Yazoo Brewing Company<\u002Fspan><span class=\"price\">Tours $12 / Pints $5–7<\u002Fspan><\u002Fdiv><div class=\"desc\">Madison brewery + taproom · the local Sue (sour brown ale) is a staple.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Madison<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Jack Daniel's Distillery<\u002Fspan><span class=\"price\">Tours $25–45<\u002Fspan><\u002Fdiv><div class=\"desc\">An hour-and-a-half south in Lynchburg — a half-day trip, &amp; the only place in a dry county you can drink Jack.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Day Trip<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">vi.<\u002Fspan>\n      <span class=\"cat-title\">Parks &amp; Outdoors<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Centennial Park<\u002Fspan><span class=\"price\">Free<\u002Fspan><\u002Fdiv><div class=\"desc\">The big city-centre park · jogging loop, lake, sunset, &amp; the Parthenon glowing in the middle of it.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Walkable from West<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Shelby Bottoms Greenway<\u002Fspan><span class=\"price\">Free<\u002Fspan><\u002Fdiv><div class=\"desc\">5+ miles of paved riverside path · rent bikes nearby &amp; spend the afternoon.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">East Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Radnor Lake State Park<\u002Fspan><span class=\"price\">Free<\u002Fspan><\u002Fdiv><div class=\"desc\">Quiet hiking trails &amp; deer-spotting just 10 minutes from downtown. Comfortable shoes required.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">South Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Cheekwood Estate &amp; Gardens<\u002Fspan><span class=\"price\">$25<\u002Fspan><\u002Fdiv><div class=\"desc\">A 55-acre estate with formal gardens, an art museum &amp; rotating outdoor installations. Spectacular in spring &amp; at Christmas.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">West Nash<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot-row\">\n      <span>NooknKey · 2026<\u002Fspan>\n      <span class=\"pg\">15<\u002Fspan>\n      <span>thenooknkey · com<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── 14 WANDER PAGE 3 — Workouts, Rooftops, Shopping, Sports ─ -->\n  <div class=\"page content\">\n    <div class=\"head-row\">\n      <span class=\"left\"><span class=\"dot\"><\u002Fspan>NooknKey · Where to Wander<\u002Fspan>\n      <span class=\"right\">Chapter IV · 03 of 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"page-heading\">Move, shop, <em>climb up high<\u002Fem>.<\u002Fh2>\n    <p class=\"page-lede\">Pilates &amp; aerial classes for the bachelorettes, rooftops for golden hour, shopping districts, &amp; pro sports if the season's right.<\u002Fp>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">vii.<\u002Fspan>\n      <span class=\"cat-title\">Group Workouts &amp; Classes<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">04 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Studio Pilates Nashville<\u002Fspan><span class=\"price\">$18 first class<\u002Fspan><\u002Fdiv><div class=\"desc\">Walkable from the house · drop-in friendly · reformer + mat classes.<\u002Fdiv><div class=\"meta\"><span class=\"chip walk\">Walkable<\u002Fspan><span class=\"chip outline\">4900 Centennial Blvd<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Forza Pilates<\u002Fspan><span class=\"price\">$42 / class<\u002Fspan><\u002Fdiv><div class=\"desc\">The pretty one · aesthetic studio with hard-working reformer classes. ~15 min drive.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">724 Merritt Ave<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Push-Ups &amp; Prosecco<\u002Fspan><span class=\"price\">$45/pp · $225 min<\u002Fspan><\u002Fdiv><div class=\"desc\">Private party fitness · perfect for bachelorettes &amp; girls' weekends. $100 deposit; balance charged a week before. Travel fees over 10 miles. Book: <strong>hello@pushupsandprosecco.com<\u002Fstrong>.<\u002Fdiv><div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><span class=\"chip outline\">Private<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Miss Fit Academy<\u002Fspan><span class=\"price\">From $22/pp<\u002Fspan><\u002Fdiv><div class=\"desc\">18+ aerial hammock, hoop, silk, pole &amp; chair-dance lessons. Packages: <strong>1–6 ppl $300 flat · 7–9 ppl $325 · 10+ $35/pp.<\u002Fstrong><\u002Fdiv><div class=\"meta\"><span class=\"chip bach\">Bachelorette<\u002Fspan><span class=\"chip note\">18+ Only<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-row\">\n      <span class=\"cat-num\">viii.<\u002Fspan>\n      <span class=\"cat-title\">Rooftops &amp; High Bars<\u002Fspan>\n      <span class=\"cat-rule\"><\u002Fspan>\n      <span class=\"cat-meta\">06 spots<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"listings-grid\">\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">L.A. Jackson<\u002Fspan><span class=\"price\">$$ · $14–18 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">Atop the Thompson hotel in the Gulch · 12th-floor sunsets &amp; a serious cocktail list.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Bobby Hotel Rooftop<\u002Fspan><span class=\"price\">$$ · $14–18 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">The hotel rooftop with the converted-bus pool · downtown skyline, lively scene.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Downtown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">L27 Rooftop<\u002Fspan><span class=\"price\">$$ · $14–18 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">27 floors up at the Westin Nashville · panoramic skyline + private cabanas.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">The Gulch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Acme Feed &amp; Seed<\u002Fspan><span class=\"price\">$ · $10–14 drinks<\u002Fspan><\u002Fdiv><div class=\"desc\">3 floors of party right on Broadway · top floor rooftop overlooks the river.<\u002Fdiv><div class=\"meta\"><span class=\"chip outline\">Broadway<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"listing\"><div class=\"top\"><span class=\"name\">Rare Bird Rooftop<\u002Fspan><span class=\"price\">$$ · $14–18 drinks<\u002Fspan><\
